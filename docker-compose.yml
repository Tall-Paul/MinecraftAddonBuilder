services:
  addon-manager:
    build:
      context: .
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    container_name: mc-addon-manager
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Docker API access
      - addon-data:/app/data                        # Persistent DB + addon cache
      - ./.env:/app/.env:ro                          # Config file with API keys
    restart: unless-stopped

  updater:
    build:
      context: .
      dockerfile: Dockerfile.updater
    container_name: mc-addon-updater
    working_dir: /repo
    entrypoint: /bin/sh
    command: /repo/updater.sh
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Docker API to rebuild/restart
      - .:/repo                                     # Git repo for pull
    environment:
      - UPDATE_INTERVAL=300                          # Check every 5 minutes
      - UPDATE_BRANCH=main
      - GIT_TOKEN=${GIT_TOKEN:-}                     # GitHub PAT for private repos
    restart: unless-stopped

